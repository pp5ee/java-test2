# ─── Server ────────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ─── Application name ──────────────────────────────────────────────────────────
spring.application.name=employee-management-app

# ─── MySQL DataSource ──────────────────────────────────────────────────────────
# Set the following environment variables before starting the application:
#   DB_HOST      – hostname or IP of the MySQL server  (default: localhost)
#   DB_PORT      – MySQL port                          (default: 3306)
#   DB_NAME      – schema / database name              (default: employee_mgmt)
#   DB_USERNAME  – database user
#   DB_PASSWORD  – database password
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:employee_mgmt}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Mail / SMTP ───────────────────────────────────────────────────────────────
# Set the following environment variables before starting the application:
#   MAIL_HOST      – SMTP host          (default: smtp.gmail.com)
#   MAIL_PORT      – SMTP port          (default: 587)
#   MAIL_USERNAME  – SMTP account username / email address
#   MAIL_PASSWORD  – SMTP account password or app-specific password
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Sender address shown in outgoing emails
app.mail.from=${MAIL_FROM:${MAIL_USERNAME}}

# ─── JWT ───────────────────────────────────────────────────────────────────────
# Set JWT_SECRET to a strong random secret (≥256 bits) and JWT_EXPIRATION_MS to
# your preferred token lifetime in milliseconds.
app.jwt.secret=${JWT_SECRET:changeme-replace-in-production-with-a-256bit-random-key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─── Email verification code ───────────────────────────────────────────────────
# How long (minutes) a verification code remains valid
app.verification.code.expiry-minutes=${VERIFICATION_CODE_EXPIRY_MINUTES:10}

# ─── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true

# ─── Static resources (embedded React build) ───────────────────────────────────
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.employeemanagement=DEBUG
logging.level.org.hibernate.SQL=WARN
